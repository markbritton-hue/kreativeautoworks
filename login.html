<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kreative Auto Works</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        .login-logo {
            max-width: 280px;
            width: 100%;
            margin-bottom: 30px;
        }
        .form-control, .form-control:focus {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #e2e8f0;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(96, 165, 250, 0.25);
            border-color: #60a5fa;
        }
        .form-control::placeholder { color: #64748b; }
        .form-label {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .btn-login {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            border: none;
            font-weight: 600;
            padding: 12px;
            font-size: 1rem;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="Logo.png" alt="Kreative Auto Works" class="login-logo">
        <h4 class="mb-4" style="color:#94a3b8;">Sign In</h4>
        <div id="errorMsg" class="error-msg mb-3">
            <i class="fas fa-exclamation-circle me-1"></i>
            <span id="errorText"></span>
        </div>
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-login text-white w-100" id="loginBtn">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLwbBlioEmnkTIUi9dTviNtAcnBR59ew0",
            authDomain: "markbritton-clients.firebaseapp.com",
            projectId: "markbritton-clients",
            storageBucket: "markbritton-clients.firebasestorage.app",
            messagingSenderId: "147540685673",
            appId: "1:147540685673:web:102b0f7ba7b0f37ee243f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // If already logged in, go to home
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "index.html";
            }
        });

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("loginBtn");
            const errorDiv = document.getElementById("errorMsg");
            const errorText = document.getElementById("errorText");
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing in...';
            errorDiv.style.display = "none";

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "index.html";
            } catch (err) {
                let msg = "Invalid email or password.";
                if (err.code === "auth/too-many-requests") {
                    msg = "Too many attempts. Please try again later.";
                }
                errorText.textContent = msg;
                errorDiv.style.display = "block";
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In';
        });
    </script>
</body>
</html>
