<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices - SW APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(96, 165, 250, 0.2);
        }
        .navbar-brand {
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-control, .form-control:focus, .form-select, .form-select:focus {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #e2e8f0;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 0.2rem rgba(245, 158, 11, 0.25);
            border-color: #f59e0b;
        }
        .form-control::placeholder { color: #64748b; }
        .form-label {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .form-select option { background: #1e293b; color: #e2e8f0; }
        .btn-add {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            font-weight: 600;
        }
        .btn-add:hover { background: linear-gradient(135deg, #d97706, #b45309); }
        .btn-update {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            font-weight: 600;
        }
        .btn-update:hover { background: linear-gradient(135deg, #d97706, #b45309); }
        .btn-cancel {
            background: rgba(100, 116, 139, 0.3);
            border: 1px solid rgba(100, 116, 139, 0.4);
            color: #94a3b8;
            font-weight: 600;
        }
        .btn-cancel:hover { background: rgba(100, 116, 139, 0.5); color: #e2e8f0; }
        .invoice-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }
        .invoice-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(245, 158, 11, 0.15);
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .invoice-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(245, 158, 11, 0.3);
        }
        .invoice-number {
            color: #f59e0b;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .invoice-detail {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .invoice-detail i { color: #64748b; width: 20px; }
        .invoice-total {
            color: #10b981;
            font-weight: 700;
            font-size: 1.3rem;
        }
        .badge-paid { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-unpaid, .badge-sent { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-overdue { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-draft { background: rgba(100, 116, 139, 0.2); color: #94a3b8; border: 1px solid rgba(100, 116, 139, 0.3); }
        .btn-edit { background: rgba(250, 204, 21, 0.15); border: 1px solid rgba(250, 204, 21, 0.3); color: #facc15; font-size: 0.8rem; }
        .btn-edit:hover { background: #facc15; color: #1e293b; }
        .btn-delete { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; font-size: 0.8rem; }
        .btn-delete:hover { background: #ef4444; color: white; }
        .btn-print { background: rgba(96, 165, 250, 0.15); border: 1px solid rgba(96, 165, 250, 0.3); color: #60a5fa; font-size: 0.8rem; }
        .btn-print:hover { background: #60a5fa; color: #1e293b; }
        .btn-email { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; font-size: 0.8rem; }
        .btn-email:hover { background: #10b981; color: white; }
        .search-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #e2e8f0;
            border-radius: 10px;
        }
        .search-box:focus { box-shadow: 0 0 0 0.2rem rgba(245, 158, 11, 0.25); border-color: #f59e0b; }
        .search-box::placeholder { color: #64748b; }
        .invoice-count { color: #64748b; font-size: 0.9rem; }
        .empty-state { color: #475569; padding: 60px 20px; }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; color: #334155; }
        .card-actions {
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid rgba(245, 158, 11, 0.1);
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }
        .line-item-row {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(96, 165, 250, 0.15);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .btn-remove-line { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; font-size: 0.75rem; padding: 4px 8px; }
        .btn-remove-line:hover { background: #ef4444; color: white; }
        .btn-add-line { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; font-size: 0.85rem; }
        .btn-add-line:hover { background: #10b981; color: white; }
        .totals-section { background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(245, 158, 11, 0.2); border-radius: 10px; padding: 15px; }
        .totals-section .total-row { display: flex; justify-content: space-between; padding: 4px 0; color: #94a3b8; }
        .totals-section .grand-total { color: #10b981; font-weight: 700; font-size: 1.2rem; border-top: 1px solid rgba(245, 158, 11, 0.3); padding-top: 8px; margin-top: 4px; }
        .section-divider { border-top: 1px solid rgba(96, 165, 250, 0.15); margin: 16px 0; }
        .section-label { color: #f59e0b; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 16px;
        }
        .modal-header { border-bottom: 1px solid rgba(245, 158, 11, 0.15); }
        .modal-footer { border-top: 1px solid rgba(245, 158, 11, 0.15); }
        .modal-body { max-height: 70vh; overflow-y: auto; }
        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-track { background: transparent; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.3); border-radius: 3px; }
        .btn-close-white { filter: invert(1); }
    </style>
</head>
<body>
    <div id="pageContent" style="display:none;">
    <nav class="navbar navbar-dark px-3 mb-4">
        <a href="index.html" class="navbar-brand">
            <i class="fas fa-arrow-left me-2"></i>Home
        </a>
        <button class="btn btn-sm text-white" style="background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.3); font-weight:600;" onclick="window.logoutUser()">
            <i class="fas fa-sign-out-alt me-1"></i>Sign Out
        </button>
    </nav>

    <div class="container-fluid px-4 pb-5">
        <h1 class="page-title text-center mb-4" data-aos="fade-down">
            <i class="fas fa-file-invoice-dollar me-3"></i>Invoices
        </h1>

        <!-- Summary Cards -->
        <div class="row g-3 mb-4" data-aos="fade-up" data-aos-delay="50">
            <div class="col-md-3">
                <div style="background:rgba(30,41,59,0.8); border:1px solid rgba(100,116,139,0.25); border-radius:12px; padding:16px;" class="text-center">
                    <div id="summaryDraft" style="font-size:1.8rem; font-weight:800; color:#94a3b8;">0</div>
                    <div style="color:#94a3b8; font-size:0.8rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;"><i class="fas fa-file me-1"></i> Drafts</div>
                    <div id="summaryDraftTotal" style="color:#94a3b8; font-size:0.85rem; font-weight:600; margin-top:4px;">$0.00</div>
                </div>
            </div>
            <div class="col-md-3">
                <div style="background:rgba(30,41,59,0.8); border:1px solid rgba(245,158,11,0.25); border-radius:12px; padding:16px;" class="text-center">
                    <div id="summarySent" style="font-size:1.8rem; font-weight:800; color:#f59e0b;">0</div>
                    <div style="color:#94a3b8; font-size:0.8rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;"><i class="fas fa-paper-plane me-1"></i> Sent</div>
                    <div id="summarySentTotal" style="color:#f59e0b; font-size:0.85rem; font-weight:600; margin-top:4px;">$0.00</div>
                </div>
            </div>
            <div class="col-md-3">
                <div style="background:rgba(30,41,59,0.8); border:1px solid rgba(16,185,129,0.25); border-radius:12px; padding:16px;" class="text-center">
                    <div id="summaryPaid" style="font-size:1.8rem; font-weight:800; color:#10b981;">0</div>
                    <div style="color:#94a3b8; font-size:0.8rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;"><i class="fas fa-check-circle me-1"></i> Paid</div>
                    <div id="summaryPaidTotal" style="color:#10b981; font-size:0.85rem; font-weight:600; margin-top:4px;">$0.00</div>
                </div>
            </div>
            <div class="col-md-3">
                <div style="background:rgba(30,41,59,0.8); border:1px solid rgba(239,68,68,0.25); border-radius:12px; padding:16px;" class="text-center">
                    <div id="summaryOverdue" style="font-size:1.8rem; font-weight:800; color:#ef4444;">0</div>
                    <div style="color:#94a3b8; font-size:0.8rem; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;"><i class="fas fa-exclamation-circle me-1"></i> Overdue</div>
                    <div id="summaryOverdueTotal" style="color:#ef4444; font-size:0.85rem; font-weight:600; margin-top:4px;">$0.00</div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-12" data-aos="fade-up" data-aos-delay="100">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <input type="text" id="searchBox" class="form-control search-box" placeholder="Search invoices...">
                    <span id="invoiceCount" class="invoice-count text-nowrap"></span>
                    <button class="btn btn-add text-white text-nowrap px-3" onclick="window.openAddModal()">
                        <i class="fas fa-plus me-2"></i>Create Invoice
                    </button>
                    <button class="btn btn-sm text-white text-nowrap px-3 py-2" style="background:linear-gradient(135deg,#10b981,#059669); font-weight:600; border:none; border-radius:8px;" onclick="window.exportCSV()">
                        <i class="fas fa-file-csv me-2"></i>Export CSV
                    </button>
                </div>
                <div id="invoiceList" class="invoice-grid"></div>
                <div id="emptyState" class="empty-state text-center" style="display:none;">
                    <i class="fas fa-file-invoice d-block"></i>
                    <p class="fs-5">No invoices yet</p>
                    <p>Click "Create Invoice" to get started.</p>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- Create/Edit Invoice Modal -->
    <div class="modal fade" id="invoiceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white" id="modalTitle">
                        <i class="fas fa-plus-circle me-2" id="modalIcon"></i>
                        <span id="modalTitleText">Create Invoice</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="invoiceForm">
                        <input type="hidden" id="editingId">

                        <div class="section-label"><i class="fas fa-user me-1"></i> Client</div>
                        <div class="row g-3 mb-2">
                            <div class="col-12">
                                <label class="form-label">Select Client *</label>
                                <select class="form-select" id="clientSelect" required>
                                    <option value="">-- Choose a client --</option>
                                </select>
                            </div>
                        </div>

                        <div class="section-divider"></div>

                        <div class="section-label"><i class="fas fa-info-circle me-1"></i> Invoice Details</div>
                        <div class="row g-3 mb-2">
                            <div class="col-md-4">
                                <label class="form-label">Invoice # *</label>
                                <input type="text" class="form-control" id="invoiceNumber" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Date *</label>
                                <input type="date" class="form-control" id="invoiceDate" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Due Date</label>
                                <input type="date" class="form-control" id="dueDate">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Status</label>
                                <select class="form-select" id="invoiceStatus">
                                    <option value="Draft">Draft</option>
                                    <option value="Sent">Sent</option>
                                    <option value="Paid">Paid</option>
                                    <option value="Overdue">Overdue</option>
                                </select>
                            </div>
                        </div>

                        <div class="section-divider"></div>

                        <div class="section-label d-flex justify-content-between align-items-center">
                            <span><i class="fas fa-list me-1"></i> Line Items</span>
                            <button type="button" class="btn btn-add-line btn-sm" id="addLineBtn">
                                <i class="fas fa-plus me-1"></i>Add Row
                            </button>
                        </div>
                        <div id="lineItemsContainer"></div>

                        <div class="section-divider"></div>

                        <div class="row g-3 mb-2">
                            <div class="col-md-6">
                                <label class="form-label">Tax Rate (%)</label>
                                <input type="number" class="form-control" id="taxRate" value="0" min="0" step="0.01">
                            </div>
                        </div>
                        <div class="totals-section mt-3">
                            <div class="total-row"><span>Subtotal</span><span id="subtotalDisplay">$0.00</span></div>
                            <div class="total-row"><span>Tax</span><span id="taxDisplay">$0.00</span></div>
                            <div class="total-row grand-total"><span>Total</span><span id="totalDisplay">$0.00</span></div>
                        </div>

                        <div class="section-divider"></div>

                        <div class="section-label"><i class="fas fa-sticky-note me-1"></i> Notes / Terms</div>
                        <div class="mb-3">
                            <textarea class="form-control" id="invoiceNotes" rows="3" placeholder="Payment instructions, thank you note, terms..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel px-4" data-bs-dismiss="modal">
                        <i class="fas fa-times me-2"></i>Cancel
                    </button>
                    <button type="button" class="btn btn-add text-white px-4" id="submitBtn" onclick="window.submitInvoice()">
                        <i class="fas fa-save me-2"></i>Save Invoice
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLwbBlioEmnkTIUi9dTviNtAcnBR59ew0",
            authDomain: "markbritton-clients.firebaseapp.com",
            projectId: "markbritton-clients",
            storageBucket: "markbritton-clients.firebasestorage.app",
            messagingSenderId: "147540685673",
            appId: "1:147540685673:web:102b0f7ba7b0f37ee243f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.logoutUser = async () => { await signOut(auth); window.location.href = "login.html"; };
        const invoicesRef = collection(db, "invoices");
        const clientsRef = collection(db, "clients");

        let allInvoices = [];
        let allClients = [];
        let editingId = null;
        let invoiceModal;

        const BUSINESS_NAME = "StreamWave Productions";
        const BUSINESS_ADDRESS = "58098 Kerr Creek Rd";

        function generateInvoiceNumber() {
            const now = new Date();
            const y = now.getFullYear().toString().slice(-2);
            const m = String(now.getMonth() + 1).padStart(2, "0");
            const rand = String(Math.floor(Math.random() * 9000) + 1000);
            return `INV-${y}${m}-${rand}`;
        }

        function setDueDate30() {
            const dateVal = document.getElementById("invoiceDate").value;
            if (dateVal) {
                const d = new Date(dateVal);
                d.setDate(d.getDate() + 30);
                document.getElementById("dueDate").value = d.toISOString().split("T")[0];
            }
        }

        async function loadClients() {
            const q = query(clientsRef, orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            allClients = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            const sel = document.getElementById("clientSelect");
            sel.innerHTML = '<option value="">-- Choose a client --</option>';
            allClients.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c.id;
                opt.textContent = c.company ? `${c.company} - ${c.name}` : c.name;
                sel.appendChild(opt);
            });
        }

        async function loadInvoices() {
            const q = query(invoicesRef, orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            allInvoices = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            filterAndRender();
        }

        function filterAndRender() {
            const term = document.getElementById("searchBox").value.toLowerCase();
            const filtered = allInvoices.filter(inv =>
                (inv.invoiceNumber || "").toLowerCase().includes(term) ||
                (inv.clientName || "").toLowerCase().includes(term) ||
                (inv.status || "").toLowerCase().includes(term)
            );
            renderInvoices(filtered);
        }

        function statusBadgeClass(status) {
            switch ((status || "").toLowerCase()) {
                case "paid": return "badge-paid";
                case "sent": return "badge-sent";
                case "overdue": return "badge-overdue";
                default: return "badge-draft";
            }
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text || "";
            return div.innerHTML;
        }

        function updateSummary() {
            let draft = 0, sent = 0, paid = 0, overdue = 0;
            let draftTotal = 0, sentTotal = 0, paidTotal = 0, overdueTotal = 0;
            allInvoices.forEach(inv => {
                const total = Number(inv.total) || 0;
                switch ((inv.status || "").toLowerCase()) {
                    case "draft": draft++; draftTotal += total; break;
                    case "sent": sent++; sentTotal += total; break;
                    case "paid": paid++; paidTotal += total; break;
                    case "overdue": overdue++; overdueTotal += total; break;
                }
            });
            document.getElementById("summaryDraft").textContent = draft;
            document.getElementById("summaryDraftTotal").textContent = `$${draftTotal.toFixed(2)}`;
            document.getElementById("summarySent").textContent = sent;
            document.getElementById("summarySentTotal").textContent = `$${sentTotal.toFixed(2)}`;
            document.getElementById("summaryPaid").textContent = paid;
            document.getElementById("summaryPaidTotal").textContent = `$${paidTotal.toFixed(2)}`;
            document.getElementById("summaryOverdue").textContent = overdue;
            document.getElementById("summaryOverdueTotal").textContent = `$${overdueTotal.toFixed(2)}`;
        }

        function renderInvoices(invoices) {
            updateSummary();
            const list = document.getElementById("invoiceList");
            const empty = document.getElementById("emptyState");
            const count = document.getElementById("invoiceCount");

            count.textContent = `${invoices.length} invoice${invoices.length !== 1 ? "s" : ""}`;

            if (invoices.length === 0) {
                list.innerHTML = "";
                empty.style.display = "block";
                return;
            }
            empty.style.display = "none";

            list.innerHTML = invoices.map(inv => `
                <div class="invoice-card">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div class="d-flex align-items-center gap-2">
                            <span class="invoice-number">${escapeHtml(inv.invoiceNumber)}</span>
                            <span class="badge ${statusBadgeClass(inv.status)} rounded-pill px-2 py-1" style="font-size:0.75rem;">${escapeHtml(inv.status)}</span>
                        </div>
                        <div class="invoice-total">$${Number(inv.total || 0).toFixed(2)}</div>
                    </div>
                    <div class="flex-grow-1">
                        <div class="invoice-detail mb-1"><i class="fas fa-building me-2"></i>${escapeHtml(inv.clientName)}</div>
                        <div class="invoice-detail mb-1"><i class="fas fa-calendar me-2"></i>${escapeHtml(inv.date)}${inv.dueDate ? ` <span class="ms-2"><i class="fas fa-clock me-1"></i>Due: ${escapeHtml(inv.dueDate)}</span>` : ""}</div>
                        ${inv.lineItems && inv.lineItems.length ? `<div class="invoice-detail" style="font-size:0.8rem; color:#64748b;"><i class="fas fa-list me-2"></i>${inv.lineItems.length} item${inv.lineItems.length !== 1 ? "s" : ""}</div>` : ""}
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-edit btn-sm" onclick="window.editInvoice('${inv.id}')"><i class="fas fa-pen me-1"></i>Edit</button>
                        <button class="btn btn-email btn-sm" onclick="window.emailInvoice('${inv.id}')" title="Email"><i class="fas fa-envelope me-1"></i>Email</button>
                        <button class="btn btn-print btn-sm" onclick="window.printInvoice('${inv.id}')" title="Print"><i class="fas fa-print me-1"></i>Print</button>
                        <button class="btn btn-delete btn-sm" onclick="window.deleteInvoice('${inv.id}')" title="Delete"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join("");
        }

        // --- Line Items ---
        let lineItems = [];

        function addLineItem(desc = "", qty = 1, price = 0) {
            lineItems.push({ description: desc, quantity: qty, unitPrice: price });
            renderLineItems();
        }

        function removeLineItem(index) {
            lineItems.splice(index, 1);
            renderLineItems();
        }

        function renderLineItems() {
            const container = document.getElementById("lineItemsContainer");
            if (lineItems.length === 0) {
                container.innerHTML = '<p class="text-center" style="color:#475569; font-size:0.9rem;">No line items. Click "Add Row" to begin.</p>';
                recalcTotals();
                return;
            }
            container.innerHTML = lineItems.map((item, i) => `
                <div class="line-item-row">
                    <div class="row g-2 align-items-end">
                        <div class="col">
                            <label class="form-label" style="font-size:0.75rem;">Description</label>
                            <input type="text" class="form-control form-control-sm" value="${escapeHtml(item.description)}" onchange="window.updateLineItem(${i}, 'description', this.value)" placeholder="Item description">
                        </div>
                        <div class="col-auto" style="width:80px;">
                            <label class="form-label" style="font-size:0.75rem;">Qty</label>
                            <input type="number" class="form-control form-control-sm" value="${item.quantity}" min="0" step="1" onchange="window.updateLineItem(${i}, 'quantity', this.value)">
                        </div>
                        <div class="col-auto" style="width:110px;">
                            <label class="form-label" style="font-size:0.75rem;">Unit Price</label>
                            <input type="number" class="form-control form-control-sm" value="${item.unitPrice}" min="0" step="0.01" onchange="window.updateLineItem(${i}, 'unitPrice', this.value)">
                        </div>
                        <div class="col-auto" style="width:90px;">
                            <label class="form-label" style="font-size:0.75rem;">Total</label>
                            <div class="form-control form-control-sm" style="background:transparent; border-color:transparent; color:#10b981; font-weight:600;">$${(item.quantity * item.unitPrice).toFixed(2)}</div>
                        </div>
                        <div class="col-auto">
                            <button type="button" class="btn btn-remove-line" onclick="window.removeLineItem(${i})"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                </div>
            `).join("");
            recalcTotals();
        }

        window.updateLineItem = (index, field, value) => {
            if (field === "description") { lineItems[index].description = value; }
            else { lineItems[index][field] = parseFloat(value) || 0; }
            renderLineItems();
        };
        window.removeLineItem = (index) => removeLineItem(index);

        function recalcTotals() {
            const subtotal = lineItems.reduce((sum, item) => sum + (item.quantity * item.unitPrice), 0);
            const taxRate = parseFloat(document.getElementById("taxRate").value) || 0;
            const tax = subtotal * (taxRate / 100);
            const total = subtotal + tax;
            document.getElementById("subtotalDisplay").textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById("taxDisplay").textContent = `$${tax.toFixed(2)}`;
            document.getElementById("totalDisplay").textContent = `$${total.toFixed(2)}`;
        }

        document.getElementById("taxRate").addEventListener("input", recalcTotals);
        document.getElementById("addLineBtn").addEventListener("click", () => addLineItem());
        document.getElementById("invoiceDate").addEventListener("change", setDueDate30);

        // --- Modal ---
        function resetForm() {
            document.getElementById("invoiceForm").reset();
            editingId = null;
            document.getElementById("invoiceNumber").value = generateInvoiceNumber();
            document.getElementById("invoiceDate").value = new Date().toISOString().split("T")[0];
            setDueDate30();
            document.getElementById("invoiceStatus").value = "Draft";
            document.getElementById("taxRate").value = "0";
            lineItems = [];
            renderLineItems();
        }

        window.openAddModal = () => {
            resetForm();
            addLineItem();
            document.getElementById("modalTitleText").textContent = "Create Invoice";
            document.getElementById("modalIcon").className = "fas fa-plus-circle me-2";
            const btn = document.getElementById("submitBtn");
            btn.className = "btn btn-add text-white px-4";
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Save Invoice';
            invoiceModal.show();
        };

        window.editInvoice = (id) => {
            const inv = allInvoices.find(i => i.id === id);
            if (!inv) return;

            editingId = id;
            document.getElementById("clientSelect").value = inv.clientId || "";
            document.getElementById("invoiceNumber").value = inv.invoiceNumber || "";
            document.getElementById("invoiceDate").value = inv.date || "";
            document.getElementById("dueDate").value = inv.dueDate || "";
            document.getElementById("invoiceStatus").value = inv.status || "Draft";
            document.getElementById("taxRate").value = inv.taxRate || 0;
            document.getElementById("invoiceNotes").value = inv.notes || "";

            lineItems = (inv.lineItems || []).map(li => ({
                description: li.description || "",
                quantity: li.quantity || 0,
                unitPrice: li.unitPrice || 0
            }));
            renderLineItems();

            document.getElementById("modalTitleText").textContent = "Edit Invoice";
            document.getElementById("modalIcon").className = "fas fa-edit me-2";
            const btn = document.getElementById("submitBtn");
            btn.className = "btn btn-update text-white px-4";
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Update Invoice';
            invoiceModal.show();
        };

        window.submitInvoice = async () => {
            const form = document.getElementById("invoiceForm");
            if (!form.checkValidity()) { form.reportValidity(); return; }

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';

            const clientId = document.getElementById("clientSelect").value;
            const clientObj = allClients.find(c => c.id === clientId);
            const subtotal = lineItems.reduce((sum, item) => sum + (item.quantity * item.unitPrice), 0);
            const taxRate = parseFloat(document.getElementById("taxRate").value) || 0;
            const tax = subtotal * (taxRate / 100);
            const total = subtotal + tax;

            const data = {
                clientId, clientName: clientObj ? (clientObj.company || clientObj.name) : "",
                businessName: BUSINESS_NAME, businessAddress: BUSINESS_ADDRESS, logoUrl: "Logo.png",
                invoiceNumber: document.getElementById("invoiceNumber").value.trim(),
                date: document.getElementById("invoiceDate").value,
                dueDate: document.getElementById("dueDate").value,
                paymentTerms: "Make Checks Payable to StreamWave Productions",
                lineItems: lineItems.map(li => ({ ...li })),
                taxRate, subtotal, tax, total,
                notes: document.getElementById("invoiceNotes").value.trim(),
                status: document.getElementById("invoiceStatus").value
            };

            try {
                if (editingId) {
                    await updateDoc(doc(db, "invoices", editingId), data);
                } else {
                    data.createdAt = serverTimestamp();
                    await addDoc(invoicesRef, data);
                }
                invoiceModal.hide();
                resetForm();
                await loadInvoices();
            } catch (err) {
                alert("Error saving invoice: " + err.message);
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Save Invoice';
        };

        window.deleteInvoice = async (id) => {
            if (!confirm("Delete this invoice?")) return;
            try {
                await deleteDoc(doc(db, "invoices", id));
                await loadInvoices();
            } catch (err) { alert("Error deleting invoice: " + err.message); }
        };

        // --- Print Invoice ---
        function buildInvoiceHtml(inv, { showPrintBtn = false } = {}) {
            const clientObj = allClients.find(c => c.id === inv.clientId);
            const clientAddr = clientObj ? (clientObj.address || "") : "";
            const clientEmail = clientObj ? (clientObj.email || "") : "";
            const clientCompany = clientObj ? (clientObj.company || "") : "";
            const clientContactName = clientObj ? (clientObj.name || "") : "";

            const lineRows = (inv.lineItems || []).map(li => `
                <tr>
                    <td style="padding:10px 12px; border-bottom:1px solid #e5e7eb;">${escapeHtml(li.description)}</td>
                    <td style="padding:10px 12px; border-bottom:1px solid #e5e7eb; text-align:center;">${li.quantity}</td>
                    <td style="padding:10px 12px; border-bottom:1px solid #e5e7eb; text-align:right;">$${Number(li.unitPrice).toFixed(2)}</td>
                    <td style="padding:10px 12px; border-bottom:1px solid #e5e7eb; text-align:right;">$${(li.quantity * li.unitPrice).toFixed(2)}</td>
                </tr>
            `).join("");

            const logoSrc = inv.logoUrl || "Logo.png";
            const logoHtml = `<img src="${escapeHtml(logoSrc)}" style="max-height:80px; max-width:250px; margin-bottom:10px;" alt="Logo">`;
            const statusColor = { "Paid": "#10b981", "Sent": "#f59e0b", "Overdue": "#ef4444", "Draft": "#6b7280" }[inv.status] || "#6b7280";

            return `<!DOCTYPE html>
<html><head><title>Invoice ${escapeHtml(inv.invoiceNumber)}</title>
<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; color: #1f2937; margin: 0; padding: 40px; }
    @media print { body { padding: 20px; } .no-print { display: none !important; } }
</style></head><body>
<div style="max-width:800px; margin:0 auto;">
    ${showPrintBtn ? `<div class="no-print" style="text-align:right; margin-bottom:20px;">
        <button onclick="window.print()" style="padding:10px 24px; background:#f59e0b; color:#fff; border:none; border-radius:8px; font-size:1rem; cursor:pointer; font-weight:600;">&#128424; Print / Save PDF</button>
    </div>` : ""}
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:40px;">
        <div>${logoHtml}<h2 style="margin:0 0 4px 0; color:#1f2937;">${escapeHtml(inv.businessName)}</h2><p style="margin:0; color:#6b7280; font-size:0.95rem;">${escapeHtml(inv.businessAddress)}</p></div>
        <div style="text-align:right;">
            <h1 style="margin:0 0 8px 0; font-size:2rem; color:#f59e0b;">INVOICE</h1>
            <p style="margin:2px 0; font-size:0.95rem;"><strong>${escapeHtml(inv.invoiceNumber)}</strong></p>
            <p style="margin:2px 0; font-size:0.9rem; color:#6b7280;">Date: ${escapeHtml(inv.date)}</p>
            ${inv.dueDate ? `<p style="margin:2px 0; font-size:0.9rem; color:#6b7280;">Due: ${escapeHtml(inv.dueDate)}</p>` : ""}
            <p style="margin:2px 0; font-size:0.9rem; color:#6b7280;">Make Checks Payable to StreamWave Productions</p>
            ${inv.status !== "Draft" ? `<span style="display:inline-block; margin-top:6px; padding:4px 14px; border-radius:20px; font-size:0.85rem; font-weight:600; color:#fff; background:${statusColor};">${escapeHtml(inv.status)}</span>` : ""}
        </div>
    </div>
    <div style="background:#f9fafb; border-radius:10px; padding:20px; margin-bottom:30px;">
        <p style="margin:0 0 4px 0; font-size:0.8rem; text-transform:uppercase; color:#9ca3af; font-weight:600;">Bill To</p>
        ${clientCompany ? `<p style="margin:0; font-weight:600; font-size:1.1rem;">${escapeHtml(clientCompany)}</p>` : ""}
        ${clientContactName ? `<p style="margin:2px 0; color:#4b5563;">${escapeHtml(clientContactName)}</p>` : ""}
        ${clientAddr ? `<p style="margin:2px 0; color:#6b7280;">${escapeHtml(clientAddr)}</p>` : ""}
        ${clientEmail ? `<p style="margin:2px 0; color:#6b7280;">${escapeHtml(clientEmail)}</p>` : ""}
    </div>
    <table style="width:100%; border-collapse:collapse; margin-bottom:24px;">
        <thead><tr style="background:#f59e0b; color:#fff;">
            <th style="padding:10px 12px; text-align:left; border-radius:8px 0 0 0;">Description</th>
            <th style="padding:10px 12px; text-align:center;">Qty</th>
            <th style="padding:10px 12px; text-align:right;">Unit Price</th>
            <th style="padding:10px 12px; text-align:right; border-radius:0 8px 0 0;">Total</th>
        </tr></thead>
        <tbody>${lineRows}</tbody>
    </table>
    <div style="display:flex; justify-content:flex-end;">
        <div style="width:260px;">
            <div style="display:flex; justify-content:space-between; padding:6px 0; color:#6b7280;"><span>Subtotal</span><span>$${Number(inv.subtotal).toFixed(2)}</span></div>
            <div style="display:flex; justify-content:space-between; padding:6px 0; color:#6b7280;"><span>Tax (${inv.taxRate}%)</span><span>$${Number(inv.tax).toFixed(2)}</span></div>
            <div style="display:flex; justify-content:space-between; padding:10px 0; font-size:1.3rem; font-weight:700; border-top:2px solid #f59e0b; margin-top:6px; color:#1f2937;"><span>Total</span><span>$${Number(inv.total).toFixed(2)}</span></div>
        </div>
    </div>
    ${inv.notes ? `<div style="margin-top:30px; padding:16px; background:#f9fafb; border-radius:10px; border-left:4px solid #f59e0b;">
        <p style="margin:0 0 4px 0; font-size:0.8rem; text-transform:uppercase; color:#9ca3af; font-weight:600;">Notes / Terms</p>
        <p style="margin:0; color:#4b5563; white-space:pre-wrap;">${escapeHtml(inv.notes)}</p>
    </div>` : ""}
</div></body></html>`;
        }

        window.printInvoice = (id) => {
            const inv = allInvoices.find(i => i.id === id);
            if (!inv) return;
            const html = buildInvoiceHtml(inv, { showPrintBtn: true });
            const win = window.open("", "_blank");
            win.document.write(html);
            win.document.close();
        };

        window.emailInvoice = async (id) => {
            const inv = allInvoices.find(i => i.id === id);
            if (!inv) return;
            const clientObj = allClients.find(c => c.id === inv.clientId);
            const clientEmail = clientObj ? (clientObj.email || "") : "";
            if (!clientEmail) { alert("No email address on file for this client. Please add one in the Client Manager first."); return; }
            if (!confirm(`Send invoice ${inv.invoiceNumber} to:\n\n${clientEmail}\n\nThis will generate a PDF and open your email client with it ready to attach.`)) return;

            const html = buildInvoiceHtml(inv);
            const container = document.createElement("div");
            const bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
            if (bodyMatch) container.innerHTML = bodyMatch[1];
            container.style.cssText = "position:fixed; left:-9999px; top:0; width:800px; background:#fff; color:#1f2937; font-family:'Segoe UI',Arial,sans-serif; padding:40px;";
            document.body.appendChild(container);
            try {
                await html2pdf().set({ margin: 0.3, filename: `${inv.invoiceNumber}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } }).from(container).save();
                const subject = encodeURIComponent(`Invoice ${inv.invoiceNumber} from ${BUSINESS_NAME}`);
                const body = encodeURIComponent(`Hi ${inv.clientName},\n\nPlease find attached invoice ${inv.invoiceNumber} for $${Number(inv.total).toFixed(2)}.\n\nThank you,\n${BUSINESS_NAME}`);
                window.location.href = `mailto:${clientEmail}?subject=${subject}&body=${body}`;
            } catch (err) { alert("Error generating PDF: " + err.message); }
            document.body.removeChild(container);
        };

        window.exportCSV = () => {
            if (allInvoices.length === 0) { alert("No invoices to export."); return; }
            const headers = ["Invoice #", "Client", "Date", "Due Date", "Status", "Subtotal", "Tax Rate %", "Tax", "Total", "Notes", "Line Items"];
            const rows = allInvoices.map(inv => {
                const lineItemsStr = (inv.lineItems || []).map(li => `${li.description} (${li.quantity} x $${Number(li.unitPrice).toFixed(2)})`).join("; ");
                return [inv.invoiceNumber||"", inv.clientName||"", inv.date||"", inv.dueDate||"", inv.status||"", Number(inv.subtotal||0).toFixed(2), inv.taxRate||0, Number(inv.tax||0).toFixed(2), Number(inv.total||0).toFixed(2), (inv.notes||"").replace(/"/g,'""'), lineItemsStr.replace(/"/g,'""')];
            });
            const csvContent = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
            const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a"); a.href = url; a.download = `invoices_export_${new Date().toISOString().split("T")[0]}.csv`; a.click();
            URL.revokeObjectURL(url);
        };

        document.getElementById("searchBox").addEventListener("input", filterAndRender);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById("pageContent").style.display = "block";
                invoiceModal = new bootstrap.Modal(document.getElementById("invoiceModal"));
                AOS.init({ duration: 800, once: true });
                await loadClients();
                await loadInvoices();
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
