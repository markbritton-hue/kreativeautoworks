<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mileage Tracker - SW APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(96, 165, 250, 0.2);
        }
        .navbar-brand {
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-form {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            position: sticky;
            top: 80px;
        }
        .card-form.editing {
            border-color: rgba(250, 204, 21, 0.5);
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.1);
        }
        .form-control, .form-control:focus {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #e2e8f0;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(139, 92, 246, 0.25);
            border-color: #8b5cf6;
        }
        .form-control::placeholder { color: #64748b; }
        .form-label {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .btn-add {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            font-weight: 600;
        }
        .btn-add:hover {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
        }
        .btn-update {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            font-weight: 600;
        }
        .btn-update:hover {
            background: linear-gradient(135deg, #d97706, #b45309);
        }
        .btn-cancel {
            background: rgba(100, 116, 139, 0.3);
            border: 1px solid rgba(100, 116, 139, 0.4);
            color: #94a3b8;
            font-weight: 600;
        }
        .btn-cancel:hover {
            background: rgba(100, 116, 139, 0.5);
            color: #e2e8f0;
        }
        .trip-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .trip-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(139, 92, 246, 0.3);
        }
        .trip-card.active-edit {
            border-color: rgba(250, 204, 21, 0.5);
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.1);
        }
        .trip-route {
            color: #8b5cf6;
            font-weight: 700;
            font-size: 1.05rem;
        }
        .trip-detail {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .trip-detail i {
            color: #64748b;
            width: 20px;
        }
        .trip-miles {
            color: #10b981;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .btn-edit {
            background: rgba(250, 204, 21, 0.15);
            border: 1px solid rgba(250, 204, 21, 0.3);
            color: #facc15;
            font-size: 0.8rem;
        }
        .btn-edit:hover { background: #facc15; color: #1e293b; }
        .btn-delete {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            font-size: 0.8rem;
        }
        .btn-delete:hover { background: #ef4444; color: white; }
        .search-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #e2e8f0;
            border-radius: 10px;
        }
        .search-box:focus {
            box-shadow: 0 0 0 0.2rem rgba(139, 92, 246, 0.25);
            border-color: #8b5cf6;
        }
        .search-box::placeholder { color: #64748b; }
        .trip-count {
            color: #64748b;
            font-size: 0.9rem;
        }
        .empty-state {
            color: #475569;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #334155;
        }
        .trip-list-col {
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }
        .trip-list-col::-webkit-scrollbar { width: 6px; }
        .trip-list-col::-webkit-scrollbar-track { background: transparent; }
        .trip-list-col::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 3px;
        }
        .editing-badge {
            background: rgba(250, 204, 21, 0.2);
            color: #facc15;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 6px;
            font-weight: 600;
        }
        .summary-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(139, 92, 246, 0.25);
            border-radius: 12px;
            padding: 20px;
        }
        .summary-value {
            font-size: 2rem;
            font-weight: 800;
            color: #8b5cf6;
        }
        .summary-label {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .purpose-text {
            color: #64748b;
            font-size: 0.85rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="pageContent" style="display:none;">
    <nav class="navbar navbar-dark px-3 mb-4">
        <a href="index.html" class="navbar-brand">
            <i class="fas fa-arrow-left me-2"></i>Home
        </a>
        <button class="btn btn-sm text-white" style="background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.3); font-weight:600;" onclick="window.logoutUser()">
            <i class="fas fa-sign-out-alt me-1"></i>Sign Out
        </button>
    </nav>

    <div class="container-fluid px-4 pb-5">
        <h1 class="page-title text-center mb-4" data-aos="fade-down">
            <i class="fas fa-car me-3"></i>Mileage Tracker
        </h1>

        <!-- Summary Cards -->
        <div class="row g-3 mb-4" data-aos="fade-up" data-aos-delay="50">
            <div class="col-md-4">
                <div class="summary-card text-center">
                    <div class="summary-value" id="monthMiles">0</div>
                    <div class="summary-label"><i class="fas fa-calendar me-1"></i> Miles This Month</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="summary-card text-center">
                    <div class="summary-value" id="allTimeMiles">0</div>
                    <div class="summary-label"><i class="fas fa-road me-1"></i> Miles All Time</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="summary-card text-center">
                    <div class="summary-value" id="tripCount">0</div>
                    <div class="summary-label"><i class="fas fa-map-marker-alt me-1"></i> Total Trips</div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Left: Trip List -->
            <div class="col-lg-7" data-aos="fade-right" data-aos-delay="100">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <input type="text" id="searchBox" class="form-control search-box" placeholder="Search trips by location, purpose...">
                    <span id="listCount" class="trip-count text-nowrap"></span>
                </div>
                <div id="tripList" class="trip-list-col"></div>
                <div id="emptyState" class="empty-state text-center" style="display:none;">
                    <i class="fas fa-car d-block"></i>
                    <p class="fs-5">No trips logged yet</p>
                    <p>Log your first trip using the form.</p>
                </div>
            </div>

            <!-- Right: Add/Edit Form -->
            <div class="col-lg-5" data-aos="fade-left" data-aos-delay="200">
                <div class="card-form p-4" id="formCard">
                    <h5 class="mb-3 text-white" id="formTitle">
                        <i class="fas fa-plus-circle me-2" id="formIcon"></i>
                        <span id="formTitleText">Log New Trip</span>
                    </h5>
                    <form id="tripForm">
                        <input type="hidden" id="editingId">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Date *</label>
                                <input type="date" class="form-control" id="tripDate" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Start Location *</label>
                                <input type="text" class="form-control" id="startLocation" placeholder="e.g. Home, Office..." required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">End Location *</label>
                                <input type="text" class="form-control" id="endLocation" placeholder="e.g. Client site, Airport..." required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Miles Driven *</label>
                                <input type="number" class="form-control" id="milesDriven" placeholder="0" min="0" step="0.1" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Purpose / Notes</label>
                                <textarea class="form-control" id="tripPurpose" rows="2" placeholder="Business meeting, delivery, etc."></textarea>
                            </div>
                            <div class="col-12 d-flex gap-2">
                                <button type="submit" class="btn btn-add btn-lg text-white px-4" id="submitBtn">
                                    <i class="fas fa-plus me-2"></i>Log Trip
                                </button>
                                <button type="button" class="btn btn-cancel btn-lg px-4" id="cancelBtn" style="display:none;" onclick="window.cancelEdit()">
                                    <i class="fas fa-times me-2"></i>Cancel
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLwbBlioEmnkTIUi9dTviNtAcnBR59ew0",
            authDomain: "markbritton-clients.firebaseapp.com",
            projectId: "markbritton-clients",
            storageBucket: "markbritton-clients.firebasestorage.app",
            messagingSenderId: "147540685673",
            appId: "1:147540685673:web:102b0f7ba7b0f37ee243f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const mileageRef = collection(db, "mileage");

        window.logoutUser = async () => { await signOut(auth); window.location.href = "login.html"; };

        let allTrips = [];
        let editingId = null;

        // Set date default to today
        document.getElementById("tripDate").value = new Date().toISOString().split("T")[0];

        async function loadTrips() {
            const q = query(mileageRef, orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            allTrips = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            updateSummary();
            filterAndRender();
        }

        function updateSummary() {
            const now = new Date();
            const currentMonth = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");

            let monthTotal = 0;
            let allTimeTotal = 0;

            allTrips.forEach(t => {
                const miles = Number(t.miles) || 0;
                allTimeTotal += miles;
                if ((t.date || "").startsWith(currentMonth)) {
                    monthTotal += miles;
                }
            });

            document.getElementById("monthMiles").textContent = monthTotal.toFixed(1);
            document.getElementById("allTimeMiles").textContent = allTimeTotal.toFixed(1);
            document.getElementById("tripCount").textContent = allTrips.length;
        }

        function filterAndRender() {
            const term = document.getElementById("searchBox").value.toLowerCase();
            const filtered = allTrips.filter(t =>
                (t.startLocation || "").toLowerCase().includes(term) ||
                (t.endLocation || "").toLowerCase().includes(term) ||
                (t.purpose || "").toLowerCase().includes(term) ||
                (t.date || "").includes(term)
            );
            renderTrips(filtered);
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text || "";
            return div.innerHTML;
        }

        function renderTrips(trips) {
            const list = document.getElementById("tripList");
            const empty = document.getElementById("emptyState");
            const count = document.getElementById("listCount");

            count.textContent = `${trips.length} trip${trips.length !== 1 ? "s" : ""}`;

            if (trips.length === 0) {
                list.innerHTML = "";
                empty.style.display = "block";
                return;
            }
            empty.style.display = "none";

            list.innerHTML = trips.map(t => `
                <div class="trip-card p-3 mb-3 ${editingId === t.id ? 'active-edit' : ''}" id="card-${t.id}">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <div class="trip-route mb-1">
                                <i class="fas fa-map-pin me-1"></i>${escapeHtml(t.startLocation)}
                                <i class="fas fa-arrow-right mx-2" style="font-size:0.8rem; color:#64748b;"></i>
                                ${escapeHtml(t.endLocation)}
                                ${editingId === t.id ? '<span class="editing-badge ms-2">EDITING</span>' : ""}
                            </div>
                            <div class="d-flex flex-wrap gap-3">
                                <span class="trip-detail"><i class="fas fa-calendar me-1"></i>${escapeHtml(t.date)}</span>
                                <span class="trip-miles"><i class="fas fa-road me-1"></i>${Number(t.miles).toFixed(1)} mi</span>
                            </div>
                            ${t.purpose ? `<div class="purpose-text mt-1"><i class="fas fa-sticky-note me-1"></i>${escapeHtml(t.purpose)}</div>` : ""}
                        </div>
                        <div class="d-flex gap-2 ms-3">
                            <button class="btn btn-edit btn-sm" onclick="window.editTrip('${t.id}')">
                                <i class="fas fa-pen"></i>
                            </button>
                            <button class="btn btn-delete btn-sm" onclick="window.deleteTrip('${t.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join("");
        }

        // --- Form Mode ---
        function setFormMode(mode) {
            const formCard = document.getElementById("formCard");
            const titleText = document.getElementById("formTitleText");
            const formIcon = document.getElementById("formIcon");
            const submitBtn = document.getElementById("submitBtn");
            const cancelBtn = document.getElementById("cancelBtn");

            if (mode === "edit") {
                formCard.classList.add("editing");
                titleText.textContent = "Edit Trip";
                formIcon.className = "fas fa-edit me-2";
                submitBtn.className = "btn btn-update btn-lg text-white px-4";
                submitBtn.innerHTML = '<i class="fas fa-save me-2"></i>Update Trip';
                cancelBtn.style.display = "inline-block";
            } else {
                formCard.classList.remove("editing");
                titleText.textContent = "Log New Trip";
                formIcon.className = "fas fa-plus-circle me-2";
                submitBtn.className = "btn btn-add btn-lg text-white px-4";
                submitBtn.innerHTML = '<i class="fas fa-plus me-2"></i>Log Trip';
                cancelBtn.style.display = "none";
                editingId = null;
            }
        }

        // --- Edit Trip ---
        window.editTrip = (id) => {
            const trip = allTrips.find(t => t.id === id);
            if (!trip) return;

            editingId = id;
            document.getElementById("tripDate").value = trip.date || "";
            document.getElementById("startLocation").value = trip.startLocation || "";
            document.getElementById("endLocation").value = trip.endLocation || "";
            document.getElementById("milesDriven").value = trip.miles || "";
            document.getElementById("tripPurpose").value = trip.purpose || "";

            setFormMode("edit");
            filterAndRender();
            document.getElementById("formCard").scrollIntoView({ behavior: "smooth", block: "start" });
        };

        window.cancelEdit = () => {
            editingId = null;
            document.getElementById("tripForm").reset();
            document.getElementById("tripDate").value = new Date().toISOString().split("T")[0];
            setFormMode("add");
            filterAndRender();
        };

        // --- Save Trip ---
        document.getElementById("tripForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;

            const data = {
                date: document.getElementById("tripDate").value,
                startLocation: document.getElementById("startLocation").value.trim(),
                endLocation: document.getElementById("endLocation").value.trim(),
                miles: parseFloat(document.getElementById("milesDriven").value) || 0,
                purpose: document.getElementById("tripPurpose").value.trim()
            };

            try {
                if (editingId) {
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Updating...';
                    await updateDoc(doc(db, "mileage", editingId), data);
                    editingId = null;
                    setFormMode("add");
                } else {
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';
                    data.createdAt = serverTimestamp();
                    await addDoc(mileageRef, data);
                }
                e.target.reset();
                document.getElementById("tripDate").value = new Date().toISOString().split("T")[0];
                await loadTrips();
            } catch (err) {
                alert("Error: " + err.message);
            }

            btn.disabled = false;
            setFormMode(editingId ? "edit" : "add");
        });

        // --- Delete Trip ---
        window.deleteTrip = async (id) => {
            if (!confirm("Delete this trip?")) return;
            try {
                await deleteDoc(doc(db, "mileage", id));
                if (editingId === id) {
                    editingId = null;
                    document.getElementById("tripForm").reset();
                    document.getElementById("tripDate").value = new Date().toISOString().split("T")[0];
                    setFormMode("add");
                }
                await loadTrips();
            } catch (err) {
                alert("Error deleting trip: " + err.message);
            }
        };

        // --- Search ---
        document.getElementById("searchBox").addEventListener("input", filterAndRender);

        // --- Init ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById("pageContent").style.display = "block";
                AOS.init({ duration: 800, once: true });
                await loadTrips();
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
