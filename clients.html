<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Manager - Mark Britton</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(96, 165, 250, 0.2);
        }
        .navbar-brand {
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-form {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.2);
            border-radius: 16px;
        }
        .form-control, .form-control:focus {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #e2e8f0;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(96, 165, 250, 0.25);
            border-color: #60a5fa;
        }
        .form-control::placeholder {
            color: #64748b;
        }
        .form-label {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .btn-add {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            font-weight: 600;
        }
        .btn-add:hover {
            background: linear-gradient(135deg, #059669, #047857);
        }
        .client-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.15);
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .client-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(96, 165, 250, 0.3);
        }
        .client-name {
            color: #60a5fa;
            font-weight: 700;
            font-size: 1.1rem;
        }
        .client-detail {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .client-detail i {
            color: #64748b;
            width: 20px;
        }
        .btn-delete {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            font-size: 0.8rem;
        }
        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }
        .search-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #e2e8f0;
            border-radius: 10px;
        }
        .search-box:focus {
            box-shadow: 0 0 0 0.2rem rgba(96, 165, 250, 0.25);
            border-color: #60a5fa;
        }
        .search-box::placeholder {
            color: #64748b;
        }
        .client-count {
            color: #64748b;
            font-size: 0.9rem;
        }
        .empty-state {
            color: #475569;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #334155;
        }
        .notes-text {
            color: #64748b;
            font-size: 0.85rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-3 mb-4">
        <a href="index.html" class="navbar-brand">
            <i class="fas fa-arrow-left me-2"></i>Mark Britton
        </a>
    </nav>

    <div class="container pb-5">
        <h1 class="page-title text-center mb-4" data-aos="fade-down">
            <i class="fas fa-users me-3"></i>Client Manager
        </h1>

        <div class="card-form p-4 mb-4" data-aos="fade-up" data-aos-delay="100">
            <h5 class="mb-3 text-white"><i class="fas fa-user-plus me-2"></i>Add New Client</h5>
            <form id="clientForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Name *</label>
                        <input type="text" class="form-control" id="clientName" placeholder="Full name" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="clientEmail" placeholder="email@example.com">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="clientPhone" placeholder="Phone number">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Company</label>
                        <input type="text" class="form-control" id="clientCompany" placeholder="Company name">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" id="clientAddress" placeholder="Full address">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Notes</label>
                        <textarea class="form-control" id="clientNotes" rows="2" placeholder="Any additional notes..."></textarea>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-add btn-lg text-white px-4">
                            <i class="fas fa-plus me-2"></i>Add Client
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="d-flex align-items-center gap-3 mb-3" data-aos="fade-up" data-aos-delay="200">
            <input type="text" id="searchBox" class="form-control search-box" placeholder="Search clients by name, email, company...">
            <span id="clientCount" class="client-count text-nowrap"></span>
        </div>

        <div id="clientList"></div>

        <div id="emptyState" class="empty-state text-center" style="display:none;">
            <i class="fas fa-user-slash d-block"></i>
            <p class="fs-5">No clients yet</p>
            <p>Add your first client using the form above.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLwbBlioEmnkTIUi9dTviNtAcnBR59ew0",
            authDomain: "markbritton-clients.firebaseapp.com",
            projectId: "markbritton-clients",
            storageBucket: "markbritton-clients.firebasestorage.app",
            messagingSenderId: "147540685673",
            appId: "1:147540685673:web:102b0f7ba7b0f37ee243f8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const clientsRef = collection(db, "clients");

        let allClients = [];

        async function loadClients() {
            const q = query(clientsRef, orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            allClients = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            filterAndRender();
        }

        function filterAndRender() {
            const term = document.getElementById("searchBox").value.toLowerCase();
            const filtered = allClients.filter(c =>
                (c.name || "").toLowerCase().includes(term) ||
                (c.email || "").toLowerCase().includes(term) ||
                (c.company || "").toLowerCase().includes(term) ||
                (c.phone || "").toLowerCase().includes(term) ||
                (c.address || "").toLowerCase().includes(term)
            );
            renderClients(filtered);
        }

        function renderClients(clients) {
            const list = document.getElementById("clientList");
            const empty = document.getElementById("emptyState");
            const count = document.getElementById("clientCount");

            count.textContent = `${clients.length} client${clients.length !== 1 ? "s" : ""}`;

            if (clients.length === 0) {
                list.innerHTML = "";
                empty.style.display = "block";
                return;
            }
            empty.style.display = "none";

            list.innerHTML = clients.map(c => `
                <div class="client-card p-3 mb-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <div class="client-name mb-2">
                                <i class="fas fa-user me-2"></i>${escapeHtml(c.name)}
                                ${c.company ? `<span class="text-white-50 ms-2 fw-normal" style="font-size:0.85rem">@ ${escapeHtml(c.company)}</span>` : ""}
                            </div>
                            <div class="d-flex flex-wrap gap-3">
                                ${c.email ? `<span class="client-detail"><i class="fas fa-envelope me-1"></i>${escapeHtml(c.email)}</span>` : ""}
                                ${c.phone ? `<span class="client-detail"><i class="fas fa-phone me-1"></i>${escapeHtml(c.phone)}</span>` : ""}
                                ${c.address ? `<span class="client-detail"><i class="fas fa-map-marker-alt me-1"></i>${escapeHtml(c.address)}</span>` : ""}
                            </div>
                            ${c.notes ? `<div class="notes-text mt-2"><i class="fas fa-sticky-note me-1"></i>${escapeHtml(c.notes)}</div>` : ""}
                        </div>
                        <button class="btn btn-delete btn-sm ms-3" onclick="window.deleteClient('${c.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join("");
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById("clientForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector("button[type=submit]");
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Adding...';

            try {
                await addDoc(clientsRef, {
                    name: document.getElementById("clientName").value.trim(),
                    email: document.getElementById("clientEmail").value.trim(),
                    phone: document.getElementById("clientPhone").value.trim(),
                    company: document.getElementById("clientCompany").value.trim(),
                    address: document.getElementById("clientAddress").value.trim(),
                    notes: document.getElementById("clientNotes").value.trim(),
                    createdAt: serverTimestamp()
                });
                e.target.reset();
                await loadClients();
            } catch (err) {
                alert("Error adding client: " + err.message);
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-plus me-2"></i>Add Client';
        });

        window.deleteClient = async (id) => {
            if (!confirm("Delete this client?")) return;
            try {
                await deleteDoc(doc(db, "clients", id));
                await loadClients();
            } catch (err) {
                alert("Error deleting client: " + err.message);
            }
        };

        document.getElementById("searchBox").addEventListener("input", filterAndRender);

        AOS.init({ duration: 800, once: true });
        loadClients();
    </script>
</body>
</html>
