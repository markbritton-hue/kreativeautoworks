<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Manager - SW APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(96, 165, 250, 0.2);
        }
        .navbar-brand {
            font-weight: 700;
            color: #fff !important;
            background-color: #2563eb;
            border: 2px solid #60a5fa;
            border-radius: 8px;
            padding: 6px 14px;
            -webkit-text-fill-color: #fff;
        }
        .navbar-brand:hover {
            background-color: #1d4ed8;
            border-color: #a78bfa;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-control, .form-control:focus {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #e2e8f0;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.2rem rgba(96, 165, 250, 0.25);
            border-color: #60a5fa;
        }
        .form-control::placeholder { color: #64748b; }
        .form-label {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.875rem;
        }
        .btn-add {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            font-weight: 600;
        }
        .btn-add:hover {
            background: linear-gradient(135deg, #059669, #047857);
        }
        .btn-update {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            font-weight: 600;
        }
        .btn-update:hover {
            background: linear-gradient(135deg, #d97706, #b45309);
        }
        .btn-cancel {
            background: rgba(100, 116, 139, 0.3);
            border: 1px solid rgba(100, 116, 139, 0.4);
            color: #94a3b8;
            font-weight: 600;
        }
        .btn-cancel:hover {
            background: rgba(100, 116, 139, 0.5);
            color: #e2e8f0;
        }
        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        .client-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(96, 165, 250, 0.15);
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .client-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(96, 165, 250, 0.3);
        }
        .client-name {
            color: #60a5fa;
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(96, 165, 250, 0.1);
        }
        .client-detail {
            color: #94a3b8;
            font-size: 0.88rem;
            margin-bottom: 6px;
        }
        .client-detail i {
            color: #64748b;
            width: 22px;
            text-align: center;
        }
        .btn-edit {
            background: rgba(250, 204, 21, 0.15);
            border: 1px solid rgba(250, 204, 21, 0.3);
            color: #facc15;
            font-size: 0.8rem;
        }
        .btn-edit:hover { background: #facc15; color: #1e293b; }
        .btn-delete {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            font-size: 0.8rem;
        }
        .btn-delete:hover { background: #ef4444; color: white; }
        .search-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #e2e8f0;
            border-radius: 10px;
        }
        .search-box:focus {
            box-shadow: 0 0 0 0.2rem rgba(96, 165, 250, 0.25);
            border-color: #60a5fa;
        }
        .search-box::placeholder { color: #64748b; }
        .client-count {
            color: #64748b;
            font-size: 0.9rem;
        }
        .empty-state {
            color: #475569;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #334155;
        }
        .notes-text {
            color: #64748b;
            font-size: 0.85rem;
            font-style: italic;
        }
        .client-actions {
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid rgba(96, 165, 250, 0.1);
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 16px;
        }
        .modal-header {
            border-bottom: 1px solid rgba(96, 165, 250, 0.15);
        }
        .modal-footer {
            border-top: 1px solid rgba(96, 165, 250, 0.15);
        }
        .btn-close-white {
            filter: invert(1);
        }
    </style>
</head>
<body>
    <div id="pageContent" style="display:none;">
    <nav class="navbar navbar-dark px-3 mb-4">
        <a href="index.html" class="navbar-brand">
            <i class="fas fa-arrow-left me-2"></i>Home
        </a>
        <button class="btn btn-sm text-white" style="background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.3); font-weight:600;" onclick="window.logoutUser()">
            <i class="fas fa-sign-out-alt me-1"></i>Sign Out
        </button>
    </nav>

    <div class="container-fluid px-4 pb-5">
        <h1 class="page-title text-center mb-4" data-aos="fade-down">
            <i class="fas fa-users me-3"></i>Client Manager
        </h1>

        <div class="row justify-content-center">
            <div class="col-lg-10" data-aos="fade-up" data-aos-delay="100">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <input type="text" id="searchBox" class="form-control search-box" placeholder="Search clients by name, email, company...">
                    <span id="clientCount" class="client-count text-nowrap"></span>
                    <button class="btn btn-add text-white text-nowrap px-3" onclick="window.openAddModal()">
                        <i class="fas fa-plus me-2"></i>Add Client
                    </button>
                </div>

                <div id="clientList" class="client-grid"></div>

                <div id="emptyState" class="empty-state text-center" style="display:none;">
                    <i class="fas fa-user-slash d-block"></i>
                    <p class="fs-5">No clients yet</p>
                    <p>Click "Add Client" to get started.</p>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- Add/Edit Client Modal -->
    <div class="modal fade" id="clientModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white" id="modalTitle">
                        <i class="fas fa-user-plus me-2" id="modalIcon"></i>
                        <span id="modalTitleText">Add New Client</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="clientForm">
                        <input type="hidden" id="editingId">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Company *</label>
                                <input type="text" class="form-control" id="clientCompany" placeholder="Company name" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Contact Name *</label>
                                <input type="text" class="form-control" id="clientName" placeholder="Full name" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="clientEmail" placeholder="email@example.com">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Phone</label>
                                <input type="tel" class="form-control" id="clientPhone" placeholder="Phone number">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <input type="text" class="form-control" id="clientAddress" placeholder="Full address">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Notes</label>
                                <textarea class="form-control" id="clientNotes" rows="2" placeholder="Any additional notes..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-cancel px-4" data-bs-dismiss="modal">
                        <i class="fas fa-times me-2"></i>Cancel
                    </button>
                    <button type="button" class="btn btn-add text-white px-4" id="submitBtn" onclick="window.submitForm()">
                        <i class="fas fa-plus me-2"></i>Add Client
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLwbBlioEmnkTIUi9dTviNtAcnBR59ew0",
            authDomain: "markbritton-clients.firebaseapp.com",
            projectId: "markbritton-clients",
            storageBucket: "markbritton-clients.firebasestorage.app",
            messagingSenderId: "147540685673",
            appId: "1:147540685673:web:102b0f7ba7b0f37ee243f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const clientsRef = collection(db, "clients");

        window.logoutUser = async () => { await signOut(auth); window.location.href = "login.html"; };

        let allClients = [];
        let editingId = null;
        let clientModal;

        async function loadClients() {
            const q = query(clientsRef, orderBy("createdAt", "desc"));
            const snapshot = await getDocs(q);
            allClients = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            allClients.sort((a, b) => {
                const compA = (a.company || "").toLowerCase();
                const compB = (b.company || "").toLowerCase();
                if (compA !== compB) return compA.localeCompare(compB);
                return (a.name || "").toLowerCase().localeCompare((b.name || "").toLowerCase());
            });
            filterAndRender();
        }

        function filterAndRender() {
            const term = document.getElementById("searchBox").value.toLowerCase();
            const filtered = allClients.filter(c =>
                (c.name || "").toLowerCase().includes(term) ||
                (c.email || "").toLowerCase().includes(term) ||
                (c.company || "").toLowerCase().includes(term) ||
                (c.phone || "").toLowerCase().includes(term) ||
                (c.address || "").toLowerCase().includes(term)
            );
            renderClients(filtered);
        }

        function renderClients(clients) {
            const list = document.getElementById("clientList");
            const empty = document.getElementById("emptyState");
            const count = document.getElementById("clientCount");

            count.textContent = `${clients.length} client${clients.length !== 1 ? "s" : ""}`;

            if (clients.length === 0) {
                list.innerHTML = "";
                empty.style.display = "block";
                return;
            }
            empty.style.display = "none";

            list.innerHTML = clients.map(c => `
                <div class="client-card" id="card-${c.id}">
                    <div class="client-name">
                        <i class="fas fa-building me-2"></i>${c.company ? escapeHtml(c.company) : escapeHtml(c.name)}
                        ${c.company ? `<br><span class="text-white-50 fw-normal" style="font-size:0.85rem; margin-left:28px;"><i class="fas fa-user me-1" style="font-size:0.75rem;"></i>${escapeHtml(c.name)}</span>` : ""}
                    </div>
                    <div class="flex-grow-1">
                        ${c.email ? `<div class="client-detail"><i class="fas fa-envelope me-2"></i>${escapeHtml(c.email)}</div>` : ""}
                        ${c.phone ? `<div class="client-detail"><i class="fas fa-phone me-2"></i>${escapeHtml(c.phone)}</div>` : ""}
                        ${c.address ? `<div class="client-detail"><i class="fas fa-map-marker-alt me-2"></i>${escapeHtml(c.address)}</div>` : ""}
                        ${c.notes ? `<div class="notes-text mt-2"><i class="fas fa-sticky-note me-1"></i>${escapeHtml(c.notes)}</div>` : ""}
                    </div>
                    <div class="client-actions">
                        <button class="btn btn-edit btn-sm" onclick="window.editClient('${c.id}')">
                            <i class="fas fa-pen me-1"></i>Edit
                        </button>
                        <button class="btn btn-delete btn-sm" onclick="window.deleteClient('${c.id}')">
                            <i class="fas fa-trash me-1"></i>Delete
                        </button>
                    </div>
                </div>
            `).join("");
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // --- Modal ---
        window.openAddModal = () => {
            editingId = null;
            document.getElementById("clientForm").reset();
            document.getElementById("modalTitleText").textContent = "Add New Client";
            document.getElementById("modalIcon").className = "fas fa-user-plus me-2";
            const btn = document.getElementById("submitBtn");
            btn.className = "btn btn-add text-white px-4";
            btn.innerHTML = '<i class="fas fa-plus me-2"></i>Add Client';
            clientModal.show();
        };

        window.editClient = (id) => {
            const client = allClients.find(c => c.id === id);
            if (!client) return;

            editingId = id;
            document.getElementById("clientCompany").value = client.company || "";
            document.getElementById("clientName").value = client.name || "";
            document.getElementById("clientEmail").value = client.email || "";
            document.getElementById("clientPhone").value = client.phone || "";
            document.getElementById("clientAddress").value = client.address || "";
            document.getElementById("clientNotes").value = client.notes || "";

            document.getElementById("modalTitleText").textContent = "Edit Client";
            document.getElementById("modalIcon").className = "fas fa-user-edit me-2";
            const btn = document.getElementById("submitBtn");
            btn.className = "btn btn-update text-white px-4";
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Update Client';
            clientModal.show();
        };

        window.submitForm = async () => {
            const form = document.getElementById("clientForm");
            if (!form.checkValidity()) { form.reportValidity(); return; }

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;

            const data = {
                name: document.getElementById("clientName").value.trim(),
                email: document.getElementById("clientEmail").value.trim(),
                phone: document.getElementById("clientPhone").value.trim(),
                company: document.getElementById("clientCompany").value.trim(),
                address: document.getElementById("clientAddress").value.trim(),
                notes: document.getElementById("clientNotes").value.trim(),
            };

            try {
                if (editingId) {
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Updating...';
                    await updateDoc(doc(db, "clients", editingId), data);
                    editingId = null;
                } else {
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Adding...';
                    data.createdAt = serverTimestamp();
                    await addDoc(clientsRef, data);
                }
                clientModal.hide();
                form.reset();
                await loadClients();
            } catch (err) {
                alert("Error: " + err.message);
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-plus me-2"></i>Add Client';
        };

        window.deleteClient = async (id) => {
            if (!confirm("Delete this client?")) return;
            try {
                await deleteDoc(doc(db, "clients", id));
                await loadClients();
            } catch (err) {
                alert("Error deleting client: " + err.message);
            }
        };

        document.getElementById("searchBox").addEventListener("input", filterAndRender);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("pageContent").style.display = "block";
                clientModal = new bootstrap.Modal(document.getElementById("clientModal"));
                AOS.init({ duration: 800, once: true });
                loadClients();
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
