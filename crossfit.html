<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossfit RSS Feeds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a2e;
            color: #eee;
        }
        .navbar-crossfit {
            background-color: #e63946 !important;
        }
        .feed-section h2 {
            color: #e63946;
            border-bottom: 2px solid #e63946;
            padding-bottom: 10px;
            font-weight: 700;
        }
        .feed-section h2 i {
            margin-right: 8px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .feed-card {
            background-color: #16213e;
            border: none;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .feed-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        .feed-card a {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .feed-card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #0f3460;
        }
        .feed-card-img-placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #0f3460, #e63946);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(255,255,255,0.3);
        }
        .feed-card .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .feed-card .card-title {
            color: #a8dadc;
            font-size: 1.05rem;
            font-weight: bold;
            line-height: 1.4;
        }
        .feed-card .card-date {
            color: #e63946;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .feed-card .card-text {
            color: #bbb;
            font-size: 0.9rem;
            line-height: 1.5;
            flex: 1;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .loading i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            text-align: center;
            padding: 20px;
            color: #e63946;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-crossfit navbar-dark py-3">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <i class="fas fa-arrow-left me-2"></i>Home
            </a>
            <span class="navbar-text text-white fw-bold fs-5">
                <i class="fas fa-dumbbell me-2"></i>Crossfit RSS Feeds
            </span>
        </div>
    </nav>

    <div class="container py-5">
        <div class="feed-section mb-5" data-aos="fade-up">
            <h2><i class="fas fa-fire"></i>CrossFit.com</h2>
            <div id="feed-crossfit" class="loading mt-4">
                <i class="fas fa-spinner fa-2x"></i>
                <p class="mt-2">Loading feed...</p>
            </div>
        </div>
        <div class="feed-section mb-5" data-aos="fade-up" data-aos-delay="100">
            <h2><i class="fas fa-newspaper"></i>The Barbell Spin</h2>
            <div id="feed-barbell" class="loading mt-4">
                <i class="fas fa-spinner fa-2x"></i>
                <p class="mt-2">Loading feed...</p>
            </div>
        </div>
        <div class="feed-section mb-5" data-aos="fade-up" data-aos-delay="200">
            <h2><i class="fas fa-bolt"></i>Morning Chalk Up</h2>
            <div id="feed-morningchalkup" class="loading mt-4">
                <i class="fas fa-spinner fa-2x"></i>
                <p class="mt-2">Loading feed...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>
    <script>
        const feeds = [
            { id: 'feed-crossfit', url: 'https://www.crossfit.com/feed' },
            { id: 'feed-barbell', url: 'https://thebarbellspin.com/feed/' },
            { id: 'feed-morningchalkup', url: 'https://morningchalkup.com/feed/' }
        ];

        function getImageFromItem(item) {
            if (item.thumbnail && item.thumbnail.length > 0) return item.thumbnail;
            if (item.enclosure && item.enclosure.link) return item.enclosure.link;
            const imgMatch = item.description && item.description.match(/<img[^>]+src="([^"]+)"/);
            if (imgMatch) return imgMatch[1];
            return null;
        }

        async function loadFeed(feedUrl, containerId) {
            const container = document.getElementById(containerId);
            try {
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status !== 'ok') {
                    throw new Error(data.message || 'Failed to load feed');
                }

                if (!data.items || data.items.length === 0) {
                    container.innerHTML = '<p class="error"><i class="fas fa-exclamation-triangle me-2"></i>No articles found.</p>';
                    return;
                }

                container.className = 'card-grid';
                container.innerHTML = data.items.slice(0, 8).map(item => {
                    const date = new Date(item.pubDate).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });
                    const desc = item.description
                        ? item.description.replace(/<[^>]*>/g, '').substring(0, 120) + '...'
                        : '';
                    const img = getImageFromItem(item);
                    const imgHtml = img
                        ? `<img class="feed-card-img" src="${img}" alt="" onerror="this.outerHTML='<div class=\\'feed-card-img-placeholder\\'><i class=\\'fas fa-dumbbell\\'></i></div>'">`
                        : '<div class="feed-card-img-placeholder"><i class="fas fa-dumbbell"></i></div>';

                    return `
                        <div class="feed-card">
                            <a href="${item.link}" target="_blank" rel="noopener">
                                ${imgHtml}
                                <div class="card-body">
                                    <div class="card-date mb-2">${date}</div>
                                    <div class="card-title mb-2">${item.title}</div>
                                    <div class="card-text">${desc}</div>
                                </div>
                            </a>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = `<p class="error"><i class="fas fa-exclamation-triangle me-2"></i>Could not load feed. ${err.message}</p>`;
            }
        }

        feeds.forEach(feed => loadFeed(feed.url, feed.id));
    </script>
</body>
</html>
