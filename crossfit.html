<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossfit RSS Feeds</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        header {
            background-color: #e63946;
            padding: 20px;
            text-align: center;
        }
        header h1 {
            font-size: 2rem;
            color: white;
        }
        .back-link {
            display: inline-block;
            margin-top: 10px;
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            opacity: 0.85;
        }
        .back-link:hover { opacity: 1; text-decoration: underline; }
        .feeds-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .feed-section {
            margin-bottom: 50px;
        }
        .feed-section h2 {
            font-size: 1.5rem;
            color: #e63946;
            border-bottom: 2px solid #e63946;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: #16213e;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        .card a {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #0f3460;
        }
        .card-img-placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #0f3460, #e63946);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(255,255,255,0.3);
        }
        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            color: #a8dadc;
            font-size: 1.05rem;
            font-weight: bold;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        .card-date {
            color: #e63946;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .card-desc {
            color: #bbb;
            font-size: 0.9rem;
            line-height: 1.5;
            flex: 1;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 1.1rem;
        }
        .error {
            text-align: center;
            padding: 20px;
            color: #e63946;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Crossfit RSS Feeds</h1>
        <a href="index.html" class="back-link">&larr; Back to Home</a>
    </header>

    <div class="feeds-container">
        <div class="feed-section">
            <h2>CrossFit.com</h2>
            <div id="feed-crossfit" class="loading">Loading feed...</div>
        </div>
        <div class="feed-section">
            <h2>The Barbell Spin - CrossFit News</h2>
            <div id="feed-barbell" class="loading">Loading feed...</div>
        </div>
        <div class="feed-section">
            <h2>Morning Chalk Up</h2>
            <div id="feed-morningchalkup" class="loading">Loading feed...</div>
        </div>
    </div>

    <script>
        const feeds = [
            { id: 'feed-crossfit', url: 'https://www.crossfit.com/feed' },
            { id: 'feed-barbell', url: 'https://thebarbellspin.com/feed/' },
            { id: 'feed-morningchalkup', url: 'https://morningchalkup.com/feed/' }
        ];

        function getImageFromItem(item) {
            if (item.thumbnail && item.thumbnail.length > 0) return item.thumbnail;
            if (item.enclosure && item.enclosure.link) return item.enclosure.link;
            const imgMatch = item.description && item.description.match(/<img[^>]+src="([^"]+)"/);
            if (imgMatch) return imgMatch[1];
            return null;
        }

        async function loadFeed(feedUrl, containerId) {
            const container = document.getElementById(containerId);
            try {
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (data.status !== 'ok') {
                    throw new Error(data.message || 'Failed to load feed');
                }

                if (!data.items || data.items.length === 0) {
                    container.innerHTML = '<p class="error">No articles found.</p>';
                    return;
                }

                container.className = 'card-grid';
                container.innerHTML = data.items.slice(0, 8).map(item => {
                    const date = new Date(item.pubDate).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });
                    const desc = item.description
                        ? item.description.replace(/<[^>]*>/g, '').substring(0, 120) + '...'
                        : '';
                    const img = getImageFromItem(item);
                    const imgHtml = img
                        ? `<img class="card-img" src="${img}" alt="" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>&#9851;</div>'">`
                        : '<div class="card-img-placeholder">&#9851;</div>';

                    return `
                        <div class="card">
                            <a href="${item.link}" target="_blank" rel="noopener">
                                ${imgHtml}
                                <div class="card-body">
                                    <div class="card-date">${date}</div>
                                    <div class="card-title">${item.title}</div>
                                    <div class="card-desc">${desc}</div>
                                </div>
                            </a>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = `<p class="error">Could not load feed. ${err.message}</p>`;
            }
        }

        feeds.forEach(feed => loadFeed(feed.url, feed.id));
    </script>
</body>
</html>
