<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firm Foundation Ministries - Live Stream</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #eee;
            min-height: 100vh;
        }
        header {
            background-color: #1d4ed8;
            padding: 20px;
            text-align: center;
        }
        header img {
            max-width: 200px;
            margin-bottom: 10px;
        }
        header h1 {
            font-size: 1.8rem;
            color: white;
        }
        header p {
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
            font-size: 0.95rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 10px;
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            opacity: 0.85;
        }
        .back-link:hover { opacity: 1; text-decoration: underline; }
        .content-layout {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        .main-player {
            flex: 1;
            min-width: 0;
        }
        .player-wrapper {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .player-wrapper iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }
        .now-playing {
            margin-top: 15px;
            padding: 0 4px;
        }
        .now-playing h2 {
            font-size: 1.2rem;
            color: #60a5fa;
        }
        .now-playing p {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 4px;
        }
        .sidebar {
            width: 360px;
            flex-shrink: 0;
            max-height: calc(100vh - 160px);
            overflow-y: auto;
        }
        .sidebar h3 {
            font-size: 1rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding: 0 4px;
        }
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }
        .video-card {
            display: flex;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.15s;
            margin-bottom: 4px;
        }
        .video-card:hover {
            background-color: #1e293b;
        }
        .video-card.active {
            background-color: #1e3a5f;
        }
        .video-card-thumb {
            width: 140px;
            height: 80px;
            flex-shrink: 0;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            background-color: #1e293b;
        }
        .video-card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-card-info {
            flex: 1;
            min-width: 0;
        }
        .video-card-title {
            color: #e2e8f0;
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-card-date {
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 6px;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #64748b;
            font-size: 0.95rem;
        }
        @media (max-width: 900px) {
            .content-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="https://uploads.boxcast.com/ccuf7gyuusz1js8pq5iq/2020-01/ukmgpoy4olijfe5rsxdf/ffmlogobwfix1280.png" alt="Firm Foundation Ministries Logo">
        <h1>Firm Foundation Ministries</h1>
        <p>Centreville, MI - Latest Broadcast</p>
        <a href="index.html" class="back-link">&larr; Back to Home</a>
    </header>

    <div class="content-layout">
        <div class="main-player">
            <div class="player-wrapper">
                <iframe id="player"
                    src="https://www.youtube.com/embed/videoseries?list=UU0wb94QvWl8RA1pCcRPmfcQ"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>
            <div class="now-playing">
                <h2 id="now-playing-title">Latest Broadcast</h2>
                <p id="now-playing-date"></p>
            </div>
        </div>

        <div class="sidebar">
            <h3>Previous Broadcasts</h3>
            <div id="video-list" class="loading">Loading videos...</div>
        </div>
    </div>

    <script>
        const CHANNEL_ID = 'UC0wb94QvWl8RA1pCcRPmfcQ';
        const RSS_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`)}`;

        function playVideo(videoId, title, date) {
            document.getElementById('player').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            document.getElementById('now-playing-title').textContent = title;
            document.getElementById('now-playing-date').textContent = date;

            document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active'));
            const card = document.querySelector(`[data-id="${videoId}"]`);
            if (card) card.classList.add('active');
        }

        async function loadVideos() {
            const container = document.getElementById('video-list');
            try {
                const res = await fetch(RSS_URL);
                const data = await res.json();

                if (data.status !== 'ok' || !data.items || data.items.length === 0) {
                    container.innerHTML = '<p style="color:#64748b;">No videos found.</p>';
                    return;
                }

                const first = data.items[0];
                const firstId = first.link.split('v=')[1];
                const firstDate = new Date(first.pubDate).toLocaleDateString('en-US', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });
                document.getElementById('player').src = `https://www.youtube.com/embed/${firstId}`;
                document.getElementById('now-playing-title').textContent = first.title;
                document.getElementById('now-playing-date').textContent = firstDate;

                container.className = '';
                container.innerHTML = data.items.map((item, i) => {
                    const videoId = item.link.split('v=')[1];
                    const date = new Date(item.pubDate).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });
                    const longDate = new Date(item.pubDate).toLocaleDateString('en-US', {
                        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                    });
                    const thumb = item.thumbnail || `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`;
                    return `
                        <div class="video-card ${i === 0 ? 'active' : ''}" data-id="${videoId}"
                             onclick="playVideo('${videoId}', '${item.title.replace(/'/g, "\\'")}', '${longDate}')">
                            <div class="video-card-thumb">
                                <img src="${thumb}" alt="">
                            </div>
                            <div class="video-card-info">
                                <div class="video-card-title">${item.title}</div>
                                <div class="video-card-date">${date}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = '<p style="color:#ef4444;">Could not load video list.</p>';
            }
        }

        loadVideos();
    </script>
</body>
</html>
