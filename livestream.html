<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firm Foundation Ministries - Live Stream</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #eee;
        }
        .navbar-stream {
            background-color: #1d4ed8 !important;
        }
        .navbar-stream .navbar-brand img {
            height: 40px;
            margin-right: 10px;
        }
        .player-wrapper {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .player-wrapper iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }
        .now-playing h2 {
            color: #60a5fa;
            font-weight: 700;
        }
        .now-playing p {
            color: #64748b;
        }
        .sidebar {
            max-height: calc(100vh - 160px);
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        .video-card {
            display: flex;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.15s;
            margin-bottom: 4px;
        }
        .video-card:hover {
            background-color: #1e293b;
        }
        .video-card.active {
            background-color: #1e3a5f;
        }
        .video-card-thumb {
            width: 140px;
            height: 80px;
            flex-shrink: 0;
            border-radius: 6px;
            overflow: hidden;
            background-color: #1e293b;
        }
        .video-card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-card-info { flex: 1; min-width: 0; }
        .video-card-title {
            color: #e2e8f0;
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-card-date {
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 6px;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #64748b;
        }
        .loading i {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-stream navbar-dark py-3">
        <div class="container-fluid px-4">
            <a href="index.html" class="navbar-brand d-flex align-items-center">
                <i class="fas fa-arrow-left me-2"></i>Home
            </a>
            <span class="navbar-text text-white d-flex align-items-center fw-bold">
                <img src="https://uploads.boxcast.com/ccuf7gyuusz1js8pq5iq/2020-01/ukmgpoy4olijfe5rsxdf/ffmlogobwfix1280.png" alt="FFM" style="height:35px" class="me-2">
                Firm Foundation Ministries
            </span>
        </div>
    </nav>

    <div class="container-fluid py-4 px-4">
        <div class="row g-4">
            <div class="col-lg-8" data-aos="fade-right">
                <div class="player-wrapper">
                    <iframe id="player"
                        src="https://www.youtube.com/embed/videoseries?list=UU0wb94QvWl8RA1pCcRPmfcQ"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="now-playing mt-3 px-1">
                    <h2 id="now-playing-title" class="fs-5"><i class="fas fa-play-circle me-2"></i>Latest Broadcast</h2>
                    <p id="now-playing-date" class="mb-0"></p>
                </div>
            </div>

            <div class="col-lg-4" data-aos="fade-left" data-aos-delay="200">
                <h6 class="text-uppercase text-secondary mb-3 px-1">
                    <i class="fas fa-list me-2"></i>Previous Broadcasts
                </h6>
                <div class="sidebar">
                    <div id="video-list" class="loading">
                        <i class="fas fa-spinner fa-2x"></i>
                        <p class="mt-2">Loading videos...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>
    <script>
        const CHANNEL_ID = 'UC0wb94QvWl8RA1pCcRPmfcQ';
        const RSS_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${CHANNEL_ID}`)}`;

        function playVideo(videoId, title, date) {
            document.getElementById('player').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            document.getElementById('now-playing-title').innerHTML = `<i class="fas fa-play-circle me-2"></i>${title}`;
            document.getElementById('now-playing-date').textContent = date;

            document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active'));
            const card = document.querySelector(`[data-id="${videoId}"]`);
            if (card) card.classList.add('active');
        }

        async function loadVideos() {
            const container = document.getElementById('video-list');
            try {
                const res = await fetch(RSS_URL);
                const data = await res.json();

                if (data.status !== 'ok' || !data.items || data.items.length === 0) {
                    container.innerHTML = '<p class="text-secondary">No videos found.</p>';
                    return;
                }

                const first = data.items[0];
                const firstId = first.link.split('v=')[1];
                const firstDate = new Date(first.pubDate).toLocaleDateString('en-US', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });
                document.getElementById('player').src = `https://www.youtube.com/embed/${firstId}`;
                document.getElementById('now-playing-title').innerHTML = `<i class="fas fa-play-circle me-2"></i>${first.title}`;
                document.getElementById('now-playing-date').textContent = firstDate;

                container.className = '';
                container.innerHTML = data.items.map((item, i) => {
                    const videoId = item.link.split('v=')[1];
                    const date = new Date(item.pubDate).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });
                    const longDate = new Date(item.pubDate).toLocaleDateString('en-US', {
                        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                    });
                    const thumb = item.thumbnail || `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`;
                    return `
                        <div class="video-card ${i === 0 ? 'active' : ''}" data-id="${videoId}"
                             onclick="playVideo('${videoId}', '${item.title.replace(/'/g, "\\'")}', '${longDate}')">
                            <div class="video-card-thumb">
                                <img src="${thumb}" alt="">
                            </div>
                            <div class="video-card-info">
                                <div class="video-card-title">${item.title}</div>
                                <div class="video-card-date"><i class="far fa-calendar-alt me-1"></i>${date}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = '<p class="text-danger"><i class="fas fa-exclamation-triangle me-2"></i>Could not load video list.</p>';
            }
        }

        loadVideos();
    </script>
</body>
</html>
