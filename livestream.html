<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firm Foundation Ministries - Live Stream</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #eee;
            min-height: 100vh;
        }
        header {
            background-color: #1d4ed8;
            padding: 20px;
            text-align: center;
        }
        header img {
            max-width: 200px;
            margin-bottom: 10px;
        }
        header h1 {
            font-size: 1.8rem;
            color: white;
        }
        header p {
            color: rgba(255,255,255,0.8);
            margin-top: 5px;
            font-size: 0.95rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 10px;
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            opacity: 0.85;
        }
        .back-link:hover { opacity: 1; text-decoration: underline; }
        .stream-container {
            max-width: 960px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .broadcast-title {
            font-size: 1.3rem;
            color: #60a5fa;
            margin-bottom: 8px;
        }
        .broadcast-date {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .player-wrapper {
            background-color: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .player-wrapper iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            font-size: 1.1rem;
        }
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #ef4444;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <img src="https://uploads.boxcast.com/ccuf7gyuusz1js8pq5iq/2020-01/ukmgpoy4olijfe5rsxdf/ffmlogobwfix1280.png" alt="Firm Foundation Ministries Logo">
        <h1>Firm Foundation Ministries</h1>
        <p>Centreville, MI - Latest Broadcast</p>
        <a href="index.html" class="back-link">&larr; Back to Home</a>
    </header>

    <div class="stream-container">
        <div class="player-wrapper">
            <iframe
                src="https://www.youtube.com/embed/videoseries?list=UU0wb94QvWl8RA1pCcRPmfcQ"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>
    </div>
</body>
</html>
