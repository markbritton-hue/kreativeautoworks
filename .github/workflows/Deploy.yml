name: Version, Release, and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  version-release-deploy:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in index.html
        id: version
        run: |
          CURRENT=$(grep -oP 'v\d+\.\d+\.\d+' index.html | head -1)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_DATE=$(date +'%B %d, %Y')
          sed -i "s/${CURRENT}/${NEW_VERSION}/" index.html
          sed -i -E "s/[A-Z][a-z]+ [0-9]{2}, [0-9]{4}/${NEW_DATE}/" index.html
          echo "VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "DATE=${NEW_DATE}" >> $GITHUB_OUTPUT

      - name: Commit and tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Bump version to ${{ steps.version.outputs.VERSION }}"
          git tag ${{ steps.version.outputs.VERSION }}
          git push origin main
          git push origin ${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.VERSION }}" \
            --title "${{ steps.version.outputs.VERSION }} — ${{ steps.version.outputs.DATE }}" \
            --notes "Released on ${{ steps.version.outputs.DATE }}"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
