name: Version and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version-and-release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in index.html
        id: version
        run: |
          CURRENT=$(grep -oP 'v\d+\.\d+\.\d+' index.html | head -1)
          MAJOR=$(echo "$CURRENT" | grep -oP '\d+' | sed -n '1p')
          MINOR=$(echo "$CURRENT" | grep -oP '\d+' | sed -n '2p')
          PATCH=$(echo "$CURRENT" | grep -oP '\d+' | sed -n '3p')
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_DATE=$(date +'%B %d, %Y')
          sed -i "s/v${MAJOR}\.${MINOR}\.${NEW_PATCH}/${NEW_VERSION}/" index.html
          sed -i -E "s/[A-Z][a-z]+ [0-9]{2}, [0-9]{4}/${NEW_DATE}/" index.html
          echo "VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "DATE=${NEW_DATE}" >> $GITHUB_OUTPUT

      - name: Commit and tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Bump version to ${{ steps.version.outputs.VERSION }}"
          git tag ${{ steps.version.outputs.VERSION }}
          git push origin main
          git push origin ${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.VERSION }}" \
            --title "${{ steps.version.outputs.VERSION }} — ${{ steps.version.outputs.DATE }}" \
            --notes "Released on ${{ steps.version.outputs.DATE }}"
