<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Britton</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .hero {
            padding-top: 80px;
            padding-bottom: 60px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-img {
            max-width: 600px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .btn-crossfit {
            background-color: #e63946;
            border: none;
            font-weight: 600;
        }
        .btn-crossfit:hover {
            background-color: #c1121f;
        }
        .btn-livestream {
            background-color: #1d4ed8;
            border: none;
            font-weight: 600;
        }
        .btn-livestream:hover {
            background-color: #1e3a8a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero text-center">
            <h1 class="mb-4" data-aos="fade-down">Mark Britton Created This</h1>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/African_Bush_Elephant.jpg/1280px-African_Bush_Elephant.jpg"
                 alt="Elephant" class="hero-img mb-5" data-aos="zoom-in" data-aos-delay="200">
            <div class="d-flex gap-3 justify-content-center flex-wrap" data-aos="fade-up" data-aos-delay="400">
                <a href="crossfit.html" class="btn btn-crossfit btn-lg text-white px-4 py-3 rounded-3 shadow">
                    <i class="fas fa-dumbbell me-2"></i>Crossfit RSS Feeds
                </a>
                <a href="livestream.html" class="btn btn-livestream btn-lg text-white px-4 py-3 rounded-3 shadow">
                    <i class="fas fa-video me-2"></i>FFM Live Stream
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>
</body>
</html>
