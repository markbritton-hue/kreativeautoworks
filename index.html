<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Britton</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .hero {
            padding-top: 80px;
            padding-bottom: 60px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-img {
            max-width: 600px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
.btn-clients {
            background-color: #10b981;
            border: none;
            font-weight: 600;
        }
        .btn-clients:hover {
            background-color: #059669;
        }
        .btn-invoices {
            background-color: #f59e0b;
            border: none;
            font-weight: 600;
        }
        .btn-invoices:hover {
            background-color: #d97706;
        }
        .btn-mileage {
            background-color: #8b5cf6;
            border: none;
            font-weight: 600;
        }
        .btn-mileage:hover {
            background-color: #7c3aed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero text-center">
            <img src="Logo.png" alt="StreamWave Productions" class="hero-img mb-5" data-aos="zoom-in" data-aos-delay="200">
            <div class="d-flex gap-3 justify-content-center flex-wrap" data-aos="fade-up" data-aos-delay="400">
<a href="clients.html" class="btn btn-clients btn-lg text-white px-4 py-3 rounded-3 shadow">
                    <i class="fas fa-users me-2"></i>Client Manager
                </a>
                <a href="invoices.html" class="btn btn-invoices btn-lg text-white px-4 py-3 rounded-3 shadow">
                    <i class="fas fa-file-invoice-dollar me-2"></i>Invoices
                </a>
                <a href="mileage.html" class="btn btn-mileage btn-lg text-white px-4 py-3 rounded-3 shadow">
                    <i class="fas fa-car me-2"></i>Mileage Tracker
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>
</body>
</html>
