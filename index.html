<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SW APP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .hero {
            padding-top: 80px;
            padding-bottom: 60px;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-img {
            max-width: 600px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
.btn-clients {
            background-color: #10b981;
            border: none;
            font-weight: 600;
        }
        .btn-clients:hover {
            background-color: #059669;
        }
        .btn-invoices {
            background-color: #f59e0b;
            border: none;
            font-weight: 600;
        }
        .btn-invoices:hover {
            background-color: #d97706;
        }
        .btn-mileage {
            background-color: #8b5cf6;
            border: none;
            font-weight: 600;
        }
        .btn-mileage:hover {
            background-color: #7c3aed;
        }
        .btn-expenses {
            background-color: #ef4444;
            border: none;
            font-weight: 600;
        }
        .btn-expenses:hover {
            background-color: #dc2626;
        }
        .btn-quotes {
            background-color: #10b981;
            border: none;
            font-weight: 600;
        }
        .btn-quotes:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>
    <div id="pageContent" style="display:none;">
    <div class="container">
        <div class="hero text-center">
            <div class="text-end mb-3">
                <button class="btn btn-sm text-white" style="background:rgba(239,68,68,0.2); border:1px solid rgba(239,68,68,0.3); font-weight:600;" onclick="window.logoutUser()">
                    <i class="fas fa-sign-out-alt me-1"></i>Sign Out
                </button>
            </div>
            <img src="Logo.png" alt="StreamWave Productions LCC" class="hero-img mb-5" data-aos="zoom-in" data-aos-delay="200">

            <div class="d-flex gap-3 justify-content-center flex-wrap" data-aos="fade-up" data-aos-delay="400">
<a href="clients.html" class="btn btn-clients btn-lg text-white px-4 py-3 rounded-3 shadow">
                    <i class="fas fa-users me-2"></i>Client Manager
                </a>
                <a href="invoices.html" class="btn btn-invoices btn-lg text-white px-4 py-3 rounded-3 shadow">
                    <i class="fas fa-file-invoice-dollar me-2"></i>Invoices
                </a>
                <a href="quotes.html" class="btn btn-quotes btn-lg text-white px-4 py-3 rounded-3 shadow">
                    <i class="fas fa-file-alt me-2"></i>Quotes
                </a>
                <a href="expenses.html" class="btn btn-expenses btn-lg text-white px-4 py-3 rounded-3 shadow">
                    <i class="fas fa-receipt me-2"></i>Expenses
                </a>
                <a href="mileage.html" class="btn btn-mileage btn-lg text-white px-4 py-3 rounded-3 shadow">
                    <i class="fas fa-car me-2"></i>Mileage Tracker
                </a>
            </div>
        </div>
    </div>

    <div class="text-center py-4 mt-3">
        <p style="color: rgba(255,255,255,0.35); font-size: 0.75rem; margin-bottom: 12px; letter-spacing: 0.05em;">v1.1.0</p>
        <img src="StreaWaveProd-LogoTrans-White.png" alt="StreamWave Productions" style="max-width: 200px; opacity: 0.7;">
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLwbBlioEmnkTIUi9dTviNtAcnBR59ew0",
            authDomain: "markbritton-clients.firebaseapp.com",
            projectId: "markbritton-clients",
            storageBucket: "markbritton-clients.firebasestorage.app",
            messagingSenderId: "147540685673",
            appId: "1:147540685673:web:102b0f7ba7b0f37ee243f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("pageContent").style.display = "block";
                AOS.init({ duration: 800, once: true });
            } else {
                window.location.href = "login.html";
            }
        });

        window.logoutUser = async () => {
            await signOut(auth);
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
